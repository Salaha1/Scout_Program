<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>مخطط اجتماعات الكشافة</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --navy:#0d2340; --navy2:#1a3a5c; --blue:#1e6fb5; --blue-light:#e8f2fc;
  --green:#1a7a4a; --green-light:#e6f5ec;
  --amber:#b56a00; --amber-light:#fff4e0;
  --red:#c0392b; --red-light:#fdecea;
  --teal:#0e7c7b; --teal-light:#e0f5f5;
  --gray:#f4f5f7; --gray2:#e8eaed; --gray3:#c4c8d0;
  --text:#1a1f2e; --text2:#4a5568; --text3:#8a94a6;
  --white:#ffffff;
  --radius:10px;
  --shadow:0 2px 12px rgba(13,35,64,.08);
  --shadow-lg:0 8px 32px rgba(13,35,64,.12);
  --font-body:'Tajawal',sans-serif;
  --font-en:'DM Sans',sans-serif;
  --sidebar-w:300px;
}

*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font-body);background:#eef2f8;color:var(--text);min-height:100vh;}

.app{display:grid;grid-template-columns:var(--sidebar-w) 1fr;min-height:100vh;}

/* SIDEBAR */
.sidebar{background:var(--navy);color:#fff;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;}
.sidebar-top{padding:1.4rem 1.2rem 1rem;border-bottom:1px solid rgba(255,255,255,.08);}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:1.2rem;}
.logo-icon{width:38px;height:38px;border-radius:10px;background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.logo-title{font-size:15px;font-weight:700;color:#fff;line-height:1.3;}
.logo-sub{font-size:11px;color:rgba(255,255,255,.4);margin-top:1px;}
.lang-toggle{display:flex;gap:6px;margin-bottom:1rem;}
.lang-btn{flex:1;padding:5px;border-radius:7px;border:1px solid rgba(255,255,255,.15);background:none;color:rgba(255,255,255,.5);font-size:12px;cursor:pointer;font-family:var(--font-body);transition:all .2s;font-weight:500;}
.lang-btn.active{background:rgba(255,255,255,.15);color:#fff;border-color:rgba(255,255,255,.3);}
.field-group{margin-bottom:.8rem;}
.field-label{font-size:11px;font-weight:700;letter-spacing:.04em;color:rgba(255,255,255,.4);text-transform:uppercase;margin-bottom:3px;display:block;}
[lang="ar"] .field-label{letter-spacing:0;font-size:11.5px;}
.field-input{width:100%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:8px;padding:8px 11px;font-size:13px;color:#fff;font-family:var(--font-body);transition:border .2s;}
.field-input::placeholder{color:rgba(255,255,255,.28);}
.field-input:focus{outline:none;border-color:rgba(255,255,255,.35);background:rgba(255,255,255,.11);}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.sidebar-section{padding:1rem 1.2rem;border-bottom:1px solid rgba(255,255,255,.08);}
.sidebar-section-title{font-size:11px;font-weight:700;letter-spacing:.06em;color:rgba(255,255,255,.3);text-transform:uppercase;margin-bottom:.7rem;}
[lang="ar"] .sidebar-section-title{letter-spacing:0;font-size:11.5px;}
.summary-stat{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.05);}
.summary-stat:last-child{border-bottom:none;}
.stat-label{font-size:12px;color:rgba(255,255,255,.5);}
.stat-value{font-size:12.5px;font-weight:700;color:#fff;}
.sidebar-actions{padding:1.2rem;margin-top:auto;}
.btn-generate{width:100%;background:var(--blue);border:none;border-radius:10px;padding:12px;font-size:13.5px;font-weight:700;color:#fff;cursor:pointer;font-family:var(--font-body);transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-generate:hover{background:#1a5fa0;}
.btn-secondary{width:100%;background:none;border:1px solid rgba(255,255,255,.14);border-radius:10px;padding:8px;font-size:12.5px;color:rgba(255,255,255,.5);cursor:pointer;font-family:var(--font-body);margin-top:7px;transition:all .2s;}
.btn-secondary:hover{border-color:rgba(255,255,255,.3);color:rgba(255,255,255,.8);}

/* MOBILE HEADER */
.mobile-header{display:none;background:var(--navy);color:#fff;padding:12px 16px;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.mobile-logo{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:700;}
.mobile-logo-icon{width:30px;height:30px;border-radius:8px;background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:15px;}
.btn-menu{background:rgba(255,255,255,.1);border:none;border-radius:7px;padding:7px 10px;color:#fff;cursor:pointer;font-size:18px;line-height:1;}
.mobile-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;}
.mobile-overlay.open{display:block;}
.sidebar.mobile-open{display:flex!important;position:fixed;inset:0;z-index:201;width:min(320px,90vw);}
[dir="rtl"] .sidebar.mobile-open{right:0;left:auto;}
[dir="ltr"] .sidebar.mobile-open{left:0;right:auto;}

/* MAIN */
.main{padding:1.6rem;overflow-y:auto;min-width:0;}
.page-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1.3rem;gap:10px;flex-wrap:wrap;}
.page-title{font-size:22px;font-weight:700;color:var(--navy);}
.page-subtitle{font-size:12.5px;color:var(--text3);margin-top:2px;line-height:1.5;}
.header-btns{display:flex;gap:8px;align-items:flex-start;flex-shrink:0;}
.btn-add{background:var(--navy);border:none;border-radius:8px;padding:9px 16px;font-size:13px;font-weight:600;color:#fff;cursor:pointer;font-family:var(--font-body);display:flex;align-items:center;gap:5px;transition:all .2s;white-space:nowrap;}
.btn-add:hover{background:var(--navy2);}

/* ACTIVITY CARDS */
.activities-list{display:flex;flex-direction:column;gap:10px;}
.activity-card{background:var(--white);border-radius:var(--radius);border:1px solid var(--gray2);box-shadow:var(--shadow);overflow:hidden;transition:box-shadow .2s,opacity .2s;}
.activity-card.dragging{opacity:.5;box-shadow:var(--shadow-lg);}
.activity-card.drag-over{border-color:var(--blue);box-shadow:0 0 0 2px rgba(30,111,181,.2);}
.card-header{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--gray);border-bottom:1px solid var(--gray2);}
.card-num{width:22px;height:22px;border-radius:50%;background:var(--navy);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.card-title-text{flex:1;font-size:13px;font-weight:600;color:var(--text);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.card-time-badge{font-size:11px;font-weight:600;color:var(--blue);background:var(--blue-light);border-radius:20px;padding:3px 8px;white-space:nowrap;flex-shrink:0;}
.card-drag{cursor:grab;color:var(--text3);padding:3px 5px;font-size:18px;user-select:none;touch-action:none;flex-shrink:0;}
.card-drag:active{cursor:grabbing;}
.card-remove{background:none;border:none;color:var(--text3);cursor:pointer;font-size:18px;line-height:1;transition:color .2s;padding:2px 5px;border-radius:5px;flex-shrink:0;}
.card-remove:hover{color:var(--red);background:var(--red-light);}
.type-row{padding:7px 12px;display:flex;gap:5px;flex-wrap:wrap;border-bottom:1px solid var(--gray);}
.type-chip{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid var(--gray2);background:var(--white);color:var(--text2);cursor:pointer;transition:all .15s;font-family:var(--font-body);}
.type-chip.active-game{background:var(--green-light);border-color:var(--green);color:var(--green);}
.type-chip.active-learning{background:var(--blue-light);border-color:var(--blue);color:var(--blue);}
.type-chip.active-ceremony{background:var(--amber-light);border-color:var(--amber);color:var(--amber);}
.type-chip.active-break{background:var(--gray);border-color:var(--gray3);color:var(--text2);}
.type-chip.active-other{background:var(--teal-light);border-color:var(--teal);color:var(--teal);}
.card-body{padding:12px;display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.input-group{display:flex;flex-direction:column;gap:3px;}
.input-label{font-size:10.5px;font-weight:700;color:var(--text3);letter-spacing:.04em;text-transform:uppercase;}
[lang="ar"] .input-label{letter-spacing:0;font-size:11px;}
.input-field{border:1px solid var(--gray2);border-radius:7px;padding:7px 10px;font-size:12.5px;color:var(--text);font-family:var(--font-body);transition:border .2s;background:var(--white);width:100%;}
.input-field:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(30,111,181,.1);}
.time-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.time-sep{color:var(--text3);font-size:12px;font-weight:700;flex-shrink:0;}
.time-picker{display:flex;align-items:center;gap:4px;background:var(--white);border:1px solid var(--gray2);border-radius:7px;padding:4px 7px;transition:border .2s;}
.time-picker:focus-within{border-color:var(--blue);box-shadow:0 0 0 3px rgba(30,111,181,.1);}
.tp-select{border:none;background:none;font-size:13px;font-weight:600;color:var(--text);font-family:var(--font-body);padding:2px 1px;cursor:pointer;outline:none;-webkit-appearance:none;appearance:none;text-align:center;width:32px;}
.tp-select:focus{outline:none;}
.tp-colon{font-size:13px;font-weight:700;color:var(--text2);}
.tp-ampm{display:flex;border-radius:5px;overflow:hidden;border:1px solid var(--gray2);margin-inline-start:3px;}
.tp-ampm-btn{border:none;background:var(--gray);color:var(--text3);font-size:11px;font-weight:700;padding:3px 7px;cursor:pointer;font-family:var(--font-body);transition:all .15s;line-height:1.4;}
.tp-ampm-btn.active{background:var(--navy);color:#fff;}
.full-col{grid-column:1/-1;}

.empty-state{text-align:center;padding:3rem 1.5rem;color:var(--text3);background:var(--white);border-radius:var(--radius);border:2px dashed var(--gray2);}
.empty-icon{font-size:36px;margin-bottom:8px;}
.empty-text{font-size:14px;color:var(--text2);margin-bottom:3px;font-weight:600;}
.empty-sub{font-size:12.5px;}

/* DRAG PLACEHOLDER */
.drop-placeholder{height:60px;border:2px dashed var(--blue);border-radius:var(--radius);background:var(--blue-light);opacity:.5;pointer-events:none;}

/* OUTPUT */
#scheduleOutput{display:none;}
#scheduleOutput.visible{display:block;}
.output-actions{display:flex;gap:8px;margin-bottom:1.3rem;flex-wrap:wrap;}
.btn-action{background:var(--white);border:1px solid var(--gray2);border-radius:8px;padding:8px 14px;font-size:12.5px;font-weight:500;color:var(--text);cursor:pointer;font-family:var(--font-body);display:flex;align-items:center;gap:6px;transition:all .2s;box-shadow:var(--shadow);}
.btn-action:hover{border-color:var(--blue);color:var(--blue);}
.btn-action.primary{background:var(--navy);color:#fff;border-color:var(--navy);}
.btn-action.primary:hover{background:var(--navy2);color:#fff;}

/* SCHEDULE CARD */
.schedule-card{background:var(--white);border-radius:14px;box-shadow:var(--shadow-lg);overflow:hidden;border:1px solid var(--gray2);}
.sch-header{background:var(--navy);padding:1.8rem 2rem 1.5rem;color:#fff;position:relative;overflow:hidden;}
.sch-header::before{content:'';position:absolute;top:-50px;left:-50px;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,.035);}
.sch-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.12);border-radius:20px;padding:4px 12px;font-size:11px;font-weight:700;color:rgba(255,255,255,.7);margin-bottom:10px;}
.sch-title{font-size:24px;font-weight:700;color:#fff;margin-bottom:4px;line-height:1.3;}
.sch-subtitle{font-size:13px;color:rgba(255,255,255,.6);}
.sch-meta-row{display:flex;gap:16px;flex-wrap:wrap;margin-top:12px;}
.sch-meta-item{display:flex;align-items:center;gap:6px;font-size:12.5px;color:rgba(255,255,255,.65);}
.sch-meta-item strong{color:#fff;}
.sch-info-strip{background:var(--blue-light);padding:10px 2rem;display:flex;gap:20px;flex-wrap:wrap;border-bottom:1px solid var(--gray2);}
.sch-info-item{font-size:12px;color:var(--navy2);}
.sch-info-item b{color:var(--navy);font-weight:700;}
.sch-body{padding:1.5rem 2rem;}
.sch-section-title{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);margin-bottom:.9rem;}
[lang="ar"] .sch-section-title{letter-spacing:0;font-size:11.5px;}
.sch-table{width:100%;border-collapse:collapse;}
.sch-table th{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--text3);padding:7px 11px;border-bottom:2px solid var(--gray2);text-align:start;}
[lang="ar"] .sch-table th{letter-spacing:0;font-size:11px;}
.sch-table td{padding:10px 11px;border-bottom:1px solid var(--gray);vertical-align:top;font-size:13px;}
.sch-table tr:last-child td{border-bottom:none;}
.sch-table tr:hover td{background:#fafbfd;}
.act-name{font-weight:700;color:var(--navy);font-size:13.5px;}
.act-pill{display:inline-block;font-size:10px;font-weight:700;border-radius:4px;padding:2px 6px;margin-inline-start:6px;vertical-align:middle;}
.pill-game{background:var(--green-light);color:var(--green);}
.pill-learning{background:var(--blue-light);color:var(--blue);}
.pill-ceremony{background:var(--amber-light);color:var(--amber);}
.pill-break{background:var(--gray);color:var(--text2);}
.pill-other{background:var(--teal-light);color:var(--teal);}
.time-col{font-size:12.5px;font-weight:600;color:var(--text2);white-space:nowrap;}
.dur-tag{font-size:11px;color:var(--text3);margin-top:2px;}
.mat-tag{display:inline-block;background:var(--gray);border-radius:4px;padding:2px 6px;margin:2px;font-size:11px;}
.notes-td{font-size:12px;color:var(--text2);font-style:italic;}
.sch-footer{margin-top:1.4rem;padding-top:1.1rem;border-top:1px solid var(--gray2);display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:12px;}
.sig-line{font-size:12px;color:var(--text3);margin-bottom:5px;}
.sig-blank{width:160px;border-bottom:1.5px solid var(--gray3);height:28px;}
.footer-note{font-size:11.5px;color:var(--text3);text-align:end;}

/* SCROLLBAR */
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:rgba(0,0,0,.14);border-radius:3px;}

/* PRINT */
@media print{
  .app{display:block;}
  .sidebar,.mobile-header,.page-header,.activities-list,.output-actions,#editorSection{display:none!important;}
  #scheduleOutput{display:block!important;}
  .schedule-card{box-shadow:none;border:none;}
  .sch-header{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .main{padding:0;}
}

/* MOBILE */
@media(max-width:760px){
  .app{grid-template-columns:1fr;}
  .sidebar{display:none;height:100vh;}
  .mobile-header{display:flex;}
  .main{padding:1rem;}
  .card-body{grid-template-columns:1fr;}
  .output-actions{gap:6px;}
  .btn-action{padding:7px 11px;font-size:12px;}
  .sch-header{padding:1.2rem 1.2rem 1rem;}
  .sch-title{font-size:18px;}
  .sch-body{padding:1rem 1.2rem;}
  .sch-info-strip{padding:8px 1.2rem;}
  .sch-table th,.sch-table td{padding:8px 7px;font-size:12px;}
  .page-title{font-size:18px;}
  .btn-add{padding:8px 12px;font-size:12px;}
}
</style>
</head>
<body>
<div class="mobile-header">
  <div class="mobile-logo">
    <div class="mobile-logo-icon">🏕</div>
    <span id="mobileLogoTitle">مخطط اجتماعات الكشافة</span>
  </div>
  <button class="btn-menu" id="btnMenu" onclick="openMobileSidebar()">☰</button>
</div>
<div class="mobile-overlay" id="mobileOverlay" onclick="closeMobileSidebar()"></div>

<div class="app">
<aside class="sidebar" id="sidebar">
  <div class="sidebar-top">
    <div class="logo">
      <div class="logo-icon">🏕</div>
      <div>
        <div class="logo-title" id="logoTitle">مخطط اجتماعات الكشافة</div>
        <div class="logo-sub" id="logoSub">منظّم الاجتماع الأسبوعي</div>
      </div>
    </div>
    <div class="lang-toggle">
      <button class="lang-btn active" id="btnAr" onclick="setLang('ar')">العربية</button>
      <button class="lang-btn" id="btnEn" onclick="setLang('en')">English</button>
    </div>
    <div class="field-group">
      <label class="field-label" id="lbl-troop">اسم الفوج / المجموعة</label>
      <input class="field-input" id="troop" type="text" oninput="saveAndUpdate()"/>
    </div>
    <div class="field-group">
      <label class="field-label" id="lbl-leader">اسم القائد</label>
      <input class="field-input" id="leader" type="text" oninput="saveAndUpdate()"/>
    </div>
    <div class="field-row">
      <div class="field-group">
        <label class="field-label" id="lbl-date">التاريخ</label>
        <input class="field-input" id="meetDate" type="date" oninput="saveAndUpdate()"/>
      </div>
      <div class="field-group">
        <label class="field-label" id="lbl-day">اليوم</label>
        <select class="field-input" id="meetDay" oninput="saveAndUpdate()">
          <option value=""></option>
        </select>
      </div>
    </div>
    <div class="field-group">
      <label class="field-label" id="lbl-location">مكان الاجتماع</label>
      <input class="field-input" id="location" type="text" oninput="saveAndUpdate()"/>
    </div>
    <div class="field-group">
      <label class="field-label" id="lbl-theme">موضوع الاجتماع</label>
      <input class="field-input" id="theme" type="text" oninput="saveAndUpdate()"/>
    </div>
    <div class="field-group">
      <label class="field-label" id="lbl-preparedBy">أعدّه</label>
      <input class="field-input" id="preparedBy" type="text" oninput="saveAndUpdate()"/>
    </div>
  </div>
  <div class="sidebar-section">
    <div class="sidebar-section-title" id="lbl-summary">ملخّص</div>
    <div class="summary-stat"><span class="stat-label" id="lbl-totalAct">عدد الأنشطة</span><span class="stat-value" id="statCount">0</span></div>
    <div class="summary-stat"><span class="stat-label" id="lbl-totalDur">المدة الكلية</span><span class="stat-value" id="statDuration">—</span></div>
    <div class="summary-stat"><span class="stat-label" id="lbl-start">وقت البداية</span><span class="stat-value" id="statStart">—</span></div>
    <div class="summary-stat"><span class="stat-label" id="lbl-end">وقت النهاية</span><span class="stat-value" id="statEnd">—</span></div>
  </div>
  <div class="sidebar-actions">
    <button class="btn-generate" id="btnGenerate" onclick="generateSchedule()">✦ <span id="lbl-generate">إنشاء الجدول</span></button>
    <button class="btn-secondary" id="btnClear" onclick="clearAll()">↺ <span id="lbl-clear">مسح الكل</span></button>
  </div>
</aside>

<main class="main">
  <div id="editorSection">
    <div class="page-header">
      <div>
        <div class="page-title" id="lbl-pageTitle">خطّط اجتماعك</div>
        <div class="page-subtitle" id="lbl-pageSub">أضف الأنشطة، رتّبها بالسحب، ثم اضغط «إنشاء الجدول»</div>
      </div>
      <div class="header-btns">
        <button class="btn-add" onclick="addActivity()" id="btnAdd">+ إضافة نشاط</button>
      </div>
    </div>
    <div class="activities-list" id="activitiesList"></div>
  </div>

  <div id="scheduleOutput">
    <div class="output-actions" id="outputActions"></div>
    <div id="scheduleCard"></div>
  </div>
</main>
</div>

<script>
const T = {
  ar: {
    logoTitle:'مخطط اجتماعات الكشافة', logoSub:'منظّم الاجتماع الأسبوعي',
    mobileTitle:'مخطط اجتماعات الكشافة',
    'lbl-troop':'اسم الفوج / المجموعة','lbl-leader':'اسم القائد',
    'lbl-date':'التاريخ','lbl-day':'اليوم',
    'lbl-location':'مكان الاجتماع','lbl-theme':'موضوع الاجتماع',
    'lbl-preparedBy':'أعدّه',
    'lbl-summary':'ملخّص','lbl-totalAct':'عدد الأنشطة',
    'lbl-totalDur':'المدة الكلية','lbl-start':'وقت البداية','lbl-end':'وقت النهاية',
    'lbl-generate':'إنشاء الجدول','lbl-clear':'مسح الكل',
    'lbl-pageTitle':'خطّط اجتماعك',

let lang = 'ar';
let activities = [];
let idCounter = 0;

// ── PERSIST ──
const STORAGE_KEY = 'scout-planner-v2';
function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      lang, activities, idCounter,
      meta: {
        troop: v('troop'), leader: v('leader'), meetDate: v('meetDate'),
        meetDay: v('meetDay'), location: v('location'), theme: v('theme'), preparedBy: v('preparedBy')
      }
    }));
  } catch(e){}
}
function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return false;
    const s = JSON.parse(raw);
    lang = s.lang || 'ar';
    activities = s.activities || [];
    idCounter = s.idCounter || activities.length;
    return s.meta || null;
  } catch(e){ return false; }
}
function v(id){ const el=document.getElementById(id); return el?el.value:''; }
function setV(id,val){ const el=document.getElementById(id); if(el&&val!==undefined) el.value=val; }

function saveAndUpdate(){ saveState(); updateSummary(); }

// ── ACTIVITIES ──
function addActivity(data) {
  const id = idCounter++;
  activities.push({
    id, startTime:data?.startTime||'', endTime:data?.endTime||'',
    name:data?.name||'', type:data?.type||'',
    responsible:data?.responsible||'', materials:data?.materials||'', notes:data?.notes||''
  });
  renderActivities();
  saveAndUpdate();
  setTimeout(()=>{const cards=document.querySelectorAll('.activity-card');if(cards.length)cards[cards.length-1].scrollIntoView({behavior:'smooth',block:'nearest'});},50);
}

function removeActivity(id) {
  activities = activities.filter(a=>a.id!==id);
  renderActivities(); saveAndUpdate();
}

function updateField(id, field, val) {
  const a = activities.find(a=>a.id===id);
  if(a){ a[field]=val; saveAndUpdate(); }
}

function setType(id, typeKey) {
  const a = activities.find(a=>a.id===id);
  if(!a) return;
  a.type = a.type===typeKey ? '' : typeKey;
  renderActivities(); saveAndUpdate();
}

function calcDuration(s,e) {
  if(!s||!e) return null;
  const [sh,sm]=s.split(':').map(Number),[eh,em]=e.split(':').map(Number);
  const d=(eh*60+em)-(sh*60+sm);
  return d>0?d:null;
}
function fmtDuration(min) {
  if(!min) return '';
  const t=T[lang];
  if(min<60) return min+' '+t.min;
  const h=Math.floor(min/60),m=min%60;
  return h+t.hrs+(m?` ${m}${t.min}`:'');
}
function fmt12(val24){
  if(!val24) return '';
  const {h,m,ampm}=parse24(val24);
  return `${h}:${String(m).padStart(2,'0')} ${ampm}`;
}
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }
function typeLabel(key){ const idx=T[lang].typeKeys.indexOf(key); return idx>=0?T[lang].types[idx]:key; }

// ── TIME PICKER HELPERS ──
function parse24(val){
  if(!val) return {h:null,m:0,ampm:'AM'};
  const [hh,mm]=val.split(':').map(Number);
  const ampm=hh>=12?'PM':'AM';
  const h12=hh===0?12:hh>12?hh-12:hh;
  return {h:h12,m:mm,ampm};
}
function to24(h,m,ampm){
  let hh=parseInt(h);
  if(ampm==='AM'&&hh===12) hh=0;
  else if(ampm==='PM'&&hh!==12) hh+=12;
  return `${String(hh).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}
function buildTimePicker(id,slot,val24){
  const {h,m,ampm}=parse24(val24);
  const hrs=Array.from({length:12},(_,i)=>i+1);
  const mins=['00','05','10','15','20','25','30','35','40','45','50','55'];
  const hOpts=hrs.map(v=>`<option value="${v}" ${h===v?'selected':''}>${v}</option>`).join('');
  const mOpts=mins.map(v=>`<option value="${v}" ${m===parseInt(v)&&val24?'selected':''}>${v}</option>`).join('');
  return `<div class="time-picker" id="tp-${id}-${slot}">
    <select class="tp-select" onchange="tpChange(${id},'${slot}')" id="tph-${id}-${slot}">${hOpts}</select>
    <span class="tp-colon">:</span>
    <select class="tp-select" style="width:36px" onchange="tpChange(${id},'${slot}')" id="tpm-${id}-${slot}">${mOpts}</select>
    <div class="tp-ampm">
      <button class="tp-ampm-btn ${ampm==='AM'?'active':''}" onclick="tpAmpm(${id},'${slot}','AM')">AM</button>
      <button class="tp-ampm-btn ${ampm==='PM'?'active':''}" onclick="tpAmpm(${id},'${slot}','PM')">PM</button>
    </div>
  </div>`;
}
function tpChange(id,slot){
  const h=document.getElementById(`tph-${id}-${slot}`).value;
  const m=document.getElementById(`tpm-${id}-${slot}`).value;
  const activeBtn=document.querySelector(`#tp-${id}-${slot} .tp-ampm-btn.active`);
  const ampm=activeBtn?activeBtn.textContent:'AM';
  const val=to24(h,m,ampm);
  const field=slot==='start'?'startTime':'endTime';
  updateField(id,field,val);
  // update badge without full rerender
  const a=activities.find(a=>a.id===id);
  if(a){
    const dur=calcDuration(a.startTime,a.endTime);
    const badge=document.querySelector(`#card-${id} .card-time-badge`);
    const header=document.querySelector(`#card-${id} .card-header`);
    if(badge){ badge.textContent=`${fmt12(a.startTime)||''}${a.endTime?' – '+fmt12(a.endTime):''} ${dur?'· '+fmtDuration(dur):''}`.trim(); }
    else if(a.startTime&&header){
      const b=document.createElement('div');
      b.className='card-time-badge';
      b.textContent=`${fmt12(a.startTime)}${a.endTime?' – '+fmt12(a.endTime):''} ${dur?'· '+fmtDuration(dur):''}`.trim();
      header.insertBefore(b,header.querySelector('.card-remove'));
    }
  }
  updateSummary();
}
function tpAmpm(id,slot,val){
  const h=document.getElementById(`tph-${id}-${slot}`).value;
  const m=document.getElementById(`tpm-${id}-${slot}`).value;
  const field=slot==='start'?'startTime':'endTime';
  const time24=to24(h,m,val);
  updateField(id,field,time24);
  // toggle button style
  document.querySelectorAll(`#tp-${id}-${slot} .tp-ampm-btn`).forEach(btn=>{
    btn.classList.toggle('active', btn.textContent===val);
  });
  const a=activities.find(a=>a.id===id);
  if(a){
    const dur=calcDuration(a.startTime,a.endTime);
    const badge=document.querySelector(`#card-${id} .card-time-badge`);
    if(badge) badge.textContent=`${fmt12(a.startTime)||''}${a.endTime?' – '+fmt12(a.endTime):''} ${dur?'· '+fmtDuration(dur):''}`.trim();
  }
  updateSummary();
}

            ${buildTimePicker(a.id,'end',a.endTime)}
          </div>

          <label class="input-label">${t.f_materials}</label>

  }).join('');

  setupTouchDrag();

function updateCardTitle(id,val){
  const el=document.querySelector(`#card-${id} .card-title-text`);
  if(el) el.innerHTML=val?esc(val):`<span style="color:#aaa;font-weight:400">…</span>`;
}
function rerenderCard(id){ renderActivities(); updateSummary(); }

function updateSummary(){
  document.getElementById('statCount').textContent=activities.length;
  const totalMin=activities.reduce((acc,a)=>{const d=calcDuration(a.startTime,a.endTime);return acc+(d||0);},0);
  const starts=activities.filter(a=>a.startTime).map(a=>a.startTime).sort();
  const ends=activities.filter(a=>a.endTime).map(a=>a.endTime).sort();
  document.getElementById('statDuration').textContent=totalMin?fmtDuration(totalMin):'—';
  document.getElementById('statStart').textContent=starts.length?fmt12(starts[0]):'—';
  document.getElementById('statEnd').textContent=ends.length?fmt12(ends[ends.length-1]):'—';

// ── DRAG & DROP (desktop) ──
let dragId = null;

function dragStart(e, id) {
  dragId = id;
  e.dataTransfer.effectAllowed = 'move';
  setTimeout(()=>{ const c=document.getElementById('card-'+id); if(c) c.classList.add('dragging'); },0);
}
function dragOver(e, id) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  document.querySelectorAll('.activity-card').forEach(c=>c.classList.remove('drag-over'));
  const c = document.getElementById('card-'+id);
  if(c && id !== dragId) c.classList.add('drag-over');
}
function dragLeave(e, id) {
  const c = document.getElementById('card-'+id);
  if(c) c.classList.remove('drag-over');
}
function drop(e, targetId) {
  e.preventDefault();
  if(dragId === null || dragId === targetId) return;
  const fromIdx = activities.findIndex(a=>a.id===dragId);
  const toIdx = activities.findIndex(a=>a.id===targetId);
  if(fromIdx<0||toIdx<0) return;
  const [item] = activities.splice(fromIdx,1);
  activities.splice(toIdx,0,item);
  dragId = null;
  renderActivities(); saveAndUpdate();
}
function dragEnd(e) {
  dragId = null;
  document.querySelectorAll('.activity-card').forEach(c=>{
    c.classList.remove('dragging','drag-over');
  });
}

// ── TOUCH DRAG (mobile) ──
function setupTouchDrag() {
  const cards = document.querySelectorAll('.activity-card');
  cards.forEach(card => {
    const handle = card.querySelector('.card-drag');
    if(!handle) return;
    let startY, startIdx, clone, placeholder;

    handle.addEventListener('touchstart', e=>{
      e.preventDefault();
      const id = parseInt(card.id.split('-')[1]);
      startIdx = activities.findIndex(a=>a.id===id);
      startY = e.touches[0].clientY;

      clone = card.cloneNode(true);
      clone.style.cssText = `position:fixed;left:${card.getBoundingClientRect().left}px;top:${card.getBoundingClientRect().top}px;width:${card.offsetWidth}px;opacity:.85;z-index:999;pointer-events:none;box-shadow:0 8px 32px rgba(0,0,0,.2);`;
      document.body.appendChild(clone);

      placeholder = document.createElement('div');
      placeholder.className = 'drop-placeholder';
      card.parentNode.insertBefore(placeholder, card);
      card.style.display = 'none';
    }, {passive:false});

    handle.addEventListener('touchmove', e=>{
      e.preventDefault();
      const dy = e.touches[0].clientY - startY;
      clone.style.top = (parseFloat(clone.style.top)+dy) + 'px';
      startY = e.touches[0].clientY;

      const touchY = e.touches[0].clientY;
      const allCards = [...document.querySelectorAll('.activity-card:not([style*="display: none"])')];
      let targetCard = null;
      allCards.forEach(c => {
        const r = c.getBoundingClientRect();
        if(touchY >= r.top && touchY <= r.bottom) targetCard = c;
      });
      if(targetCard) {
        const r = targetCard.getBoundingClientRect();
        if(touchY < r.top + r.height/2) targetCard.parentNode.insertBefore(placeholder, targetCard);
        else targetCard.parentNode.insertBefore(placeholder, targetCard.nextSibling);
      }
    }, {passive:false});

    handle.addEventListener('touchend', e=>{
      const id = parseInt(card.id.split('-')[1]);
      const fromIdx = activities.findIndex(a=>a.id===id);
      const phIdx = [...placeholder.parentNode.children].indexOf(placeholder);
      const realCards = [...document.querySelectorAll('.activity-card')];
      let toIdx = phIdx;
      // adjust for hidden card
      let count = 0;
      [...placeholder.parentNode.children].forEach((el,i)=>{
        if(i < phIdx && el.classList && el.classList.contains('activity-card') && el.style.display!=='none') count++;
      });
      if(fromIdx < count) count--;
      toIdx = count;

      clone.remove();
      placeholder.remove();
      card.style.display = '';

      if(toIdx !== fromIdx && toIdx >= 0 && toIdx < activities.length) {
        const [item] = activities.splice(fromIdx,1);
        activities.splice(toIdx,0,item);
      }
      renderActivities(); saveAndUpdate();
    });
  });
}

  if(!d) return '';
  const [y,m,day]=d.split('-');
  return `${parseInt(day)} ${T[lang].months[parseInt(m)-1]} ${y}`;
}

    </tr>`;
  }).join('');

  const generated=new Date().toLocaleDateString(lang==='ar'?'ar-LB':'en-GB',{day:'numeric',month:'long',year:'numeric'});

  document.getElementById('scheduleCard').innerHTML=`
  <div class="schedule-card" id="printArea" dir="${lang==='ar'?'rtl':'ltr'}" lang="${lang}">
    <div class="sch-header">
      <div class="sch-badge">${t.schBadge}</div>
      <div class="sch-title">${esc(meta.troop)||'—'}</div>
      ${meta.theme?`<div class="sch-subtitle">🎯 ${esc(meta.theme)}</div>`:''}
      <div class="sch-meta-row">
        ${(meta.day||meta.date)?`<div class="sch-meta-item">📅 <strong>${[meta.day,fmtDate(meta.date)].filter(Boolean).join(' · ')}</strong></div>`:''}
        ${meta.location?`<div class="sch-meta-item">📍 <strong>${esc(meta.location)}</strong></div>`:''}
        ${meta.leader?`<div class="sch-meta-item">👤 <strong>${esc(meta.leader)}</strong></div>`:''}
      </div>
    </div>
    ${(totalMin||starts.length)?`<div class="sch-info-strip">
      ${totalMin?`<div class="sch-info-item">${t.infoTotal}: <b>${fmtDuration(totalMin)}</b></div>`:''}
      ${starts.length?`<div class="sch-info-item">${t.infoStart}: <b>${fmt12(starts[0])}</b></div>`:''}
      ${ends.length?`<div class="sch-info-item">${t.infoEnd}: <b>${fmt12(ends[ends.length-1])}</b></div>`:''}
      <div class="sch-info-item">${t.infoCount}: <b>${activities.length}</b></div>
    </div>`:''}
    <div class="sch-body">
      <div class="sch-section-title">${t.schSection}</div>
      ${activities.length===0?`<p style="text-align:center;color:#aaa;padding:2rem">${t.noData}</p>`:`
      <table class="sch-table">
        <thead><tr>${t.th.map(h=>`<th>${h}</th>`).join('')}</tr></thead>
        <tbody>${rows}</tbody>
      </table>`}
      <div class="sch-footer">
        <div><div class="sig-line">${t.sigLabel}</div><div class="sig-blank"></div></div>
        <div class="footer-note">${meta.preparedBy?`${t.genLabel}: <strong>${esc(meta.preparedBy)}</strong> · `:''}${generated}</div>
      </div>
    </div>
  </div>`;

  document.getElementById('outputActions').innerHTML=`
    <button class="btn-action" onclick="backToEdit()">${t.btnBack}</button>
    <button class="btn-action primary" onclick="window.print()">${t.btnPrint}</button>
    <button class="btn-action" onclick="copyAsText()">${t.btnCopy}</button>
    <button class="btn-action" onclick="shareWhatsApp()">${t.btnWhatsapp}</button>
  `;
  document.getElementById('editorSection').style.display='none';
  const out=document.getElementById('scheduleOutput');
  out.classList.add('visible');
  window.scrollTo({top:0,behavior:'smooth'});
  closeMobileSidebar();
}

function backToEdit(){
  document.getElementById('scheduleOutput').classList.remove('visible');
  document.getElementById('editorSection').style.display='';
}

// ── EXPORT ──
function copyAsText(){
  const t=T[lang];
  const meta={troop:v('troop'),leader:v('leader'),date:fmtDate(v('meetDate')),day:v('meetDay'),location:v('location'),theme:v('theme')};
  let txt=`📋 ${t.schBadge}\n${'─'.repeat(35)}\n`;
  if(meta.troop) txt+=`🏕 ${meta.troop}\n`;
  if(meta.leader) txt+=`👤 ${meta.leader}\n`;
  if(meta.day||meta.date) txt+=`📅 ${[meta.day,meta.date].filter(Boolean).join(' · ')}\n`;
  if(meta.location) txt+=`📍 ${meta.location}\n`;
  if(meta.theme) txt+=`🎯 ${meta.theme}\n`;
  txt+='\n';
  activities.forEach((a,i)=>{
    txt+=`${i+1}. ${a.name||'—'}\n`;
    if(a.startTime||a.endTime) txt+=`   ⏰ ${[a.startTime,a.endTime].filter(Boolean).join(' → ')}\n`;
    if(a.responsible) txt+=`   👤 ${a.responsible}\n`;
    if(a.materials) txt+=`   🎒 ${a.materials}\n`;
    if(a.notes) txt+=`   📝 ${a.notes}\n`;
    txt+='\n';
  });
  txt+=`${'─'.repeat(35)}\n${new Date().toLocaleDateString()}`;
  navigator.clipboard.writeText(txt).then(()=>alert(t.copiedMsg)).catch(()=>prompt('',txt));
}

function shareWhatsApp(){
  const t=T[lang];
  const meta={troop:v('troop'),date:[v('meetDay'),fmtDate(v('meetDate'))].filter(Boolean).join(' · '),location:v('location'),theme:v('theme')};
  let txt=`📋 *${t.schBadge}*\n`;
  if(meta.troop) txt+=`🏕 *${meta.troop}*\n`;
  if(meta.date) txt+=`📅 ${meta.date}\n`;
  if(meta.location) txt+=`📍 ${meta.location}\n`;
  if(meta.theme) txt+=`🎯 _${meta.theme}_\n`;
  txt+='\n';
  activities.forEach((a,i)=>{
    txt+=`*${i+1}. ${a.name||'—'}*`;
    if(a.startTime) txt+=` (${a.startTime}${a.endTime?'–'+a.endTime:''})`;
    txt+='\n';
    if(a.responsible) txt+=`   👤 ${a.responsible}\n`;
    if(a.materials) txt+=`   🎒 ${a.materials}\n`;
    if(a.notes) txt+=`   📝 ${a.notes}\n`;
  });
  window.open('https://wa.me/?text='+encodeURIComponent(txt),'_blank');
}

function clearAll(){
  if(!confirm(T[lang].confirmClear)) return;
  activities=[]; idCounter=0;
  ['troop','leader','meetDate','meetDay','location','theme','preparedBy'].forEach(id=>{setV(id,'');});
  renderActivities(); saveAndUpdate(); backToEdit();
}

// ── INIT ──
(function init(){
  const meta = loadState();
  // apply saved lang
  const html = document.documentElement;
  html.setAttribute('lang', lang);
  html.setAttribute('dir', lang==='ar'?'rtl':'ltr');
  document.getElementById('btnAr').classList.toggle('active', lang==='ar');
  document.getElementById('btnEn').classList.toggle('active', lang==='en');
  const t = T[lang];
  document.getElementById('logoTitle').textContent = t.logoTitle;
  document.getElementById('logoSub').textContent = t.logoSub;
  const mlt = document.getElementById('mobileLogoTitle');
  if(mlt) mlt.textContent = t.mobileTitle;
  ['lbl-troop','lbl-leader','lbl-date','lbl-day','lbl-location','lbl-theme','lbl-preparedBy',
   'lbl-summary','lbl-totalAct','lbl-totalDur','lbl-start','lbl-end','lbl-pageTitle','lbl-pageSub'].forEach(id=>{
    const el=document.getElementById(id); if(el) el.textContent=t[id];
  });
  document.getElementById('lbl-generate').textContent = t['lbl-generate'];
  document.getElementById('lbl-clear').textContent = t['lbl-clear'];
  document.getElementById('btnAdd').textContent = t.btnAdd;

  buildDaySelect(meta?.meetDay || '');
  if(meta){
    setV('troop', meta.troop); setV('leader', meta.leader);
    setV('meetDate', meta.meetDate); setV('location', meta.location);
    setV('theme', meta.theme); setV('preparedBy', meta.preparedBy);
  }
  renderActivities();
  updateSummary();
})();
</script>
